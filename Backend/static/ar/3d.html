<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; }
    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
    }
    
    /* Progress Bar Styles */
    .progress-bar {
      display: block;
      width: 40%;
      height: 8px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate3d(-50%, -50%, 0);
      border-radius: 10px;
      box-shadow: 0px 3px 10px 3px rgba(0, 0, 0, 0.5), 0px 0px 5px 1px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.9);
      background-color: rgba(0, 0, 0, 0.5);
    }
    .progress-bar.hide {
      visibility: hidden;
      transition: visibility 0.3s;
    }
    .update-bar {
      background-color: rgba(255, 255, 255, 0.9);
      width: 0%;
      height: 100%;
      border-radius: 10px;
      float: left;
      transition: width 0.3s;
    }
    
    /* Center loading text */
    .loading-text {
      position: absolute;
      top: -30px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <model-viewer id="viewer" camera-controls auto-rotate shadow-intensity="1" background-color="#000000">
    <div class="progress-bar" slot="progress-bar">
      <div class="loading-text">Loading Model...</div>
      <div class="update-bar"></div>
    </div>
  </model-viewer>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const model = urlParams.get('model');
    const viewer = document.getElementById('viewer');
    const updateBar = document.querySelector('.update-bar');

    if (model) {
      viewer.src = '/models/' + model;
    }

    // Listen to download progress and update the bar width
    viewer.addEventListener('progress', (event) => {
      const progress = event.detail.totalProgress;
      updateBar.style.width = `${progress * 100}%`;
      if (progress === 1) {
        document.querySelector('.progress-bar').classList.add('hide');
      } else {
        document.querySelector('.progress-bar').classList.remove('hide');
      }
    });
  </script>
</body>
</html>
