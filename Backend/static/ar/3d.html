<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; }
    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
    }
  </style>
</head>
<body>
  <model-viewer id="viewer" camera-controls auto-rotate shadow-intensity="1" background-color="#000000"></model-viewer>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const model = urlParams.get('model');
    if (model) {
      document.getElementById('viewer').src = '/models/' + model;
    }
  </script>
</body>
</html>
